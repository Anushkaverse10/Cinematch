<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineMatch 🎬</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">

    <h1>🎬 CineMatch</h1>

    <div class="controls">

        <button onclick="window.location.href='favorites.html'">❤️ Favorites</button>

        <p>Select your genre:</p>

        <select id="genre">
            <option value="action">Action</option>
            <option value="comedy">Comedy</option>
            <option value="drama">Drama</option>
            <option value="horror">Horror</option>
            <option value="romance">Romance</option>
            <option value="scifi">Sci-Fi</option>
            <option value="thriller">Thriller</option>
            <option value="animation">Animation</option>
            <option value="mystery">Mystery</option>
            <option value="fantasy">Fantasy</option>
            <option value="hindi">Hindi</option>
        </select>

        <input type="text" id="search" placeholder="Search movie..." />
        <button onclick="searchMovie()">🔍 Search</button>

        <br />

        <button onclick="getMovies()">🎬 By Genre</button>
        <button onclick="getBlockbusters()">⭐ Blockbusters</button>
        <button onclick="getUnderrated()">💎 Underrated</button>

        <br />

        <button onclick="getUpcoming()">⏳ Upcoming</button>
        <button onclick="getInTheatres()">🎟 In Theatres</button>

    </div>

    <div id="movies"></div>

</div>

<script src="script.js"></script>
</body>
</html>
